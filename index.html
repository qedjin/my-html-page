:root{--stage-w:1366;--stage-h:768;--stage-scale:1;--safe-top:env(safe-area-inset-top,0px);--safe-right:env(safe-area-inset-right,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);}

.activity-box .ok-btn{display:block;margin:18px auto 0;padding:12px 48px;background:#5D4037;color:#FFB300;border:none;border-radius:12px;font-family:'Jua',sans-serif;font-size:20px;cursor:pointer;transition:transform .15s;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const STAGE_W = 1366;
const STAGE_H = 768;
function getViewportSize(){
    /* Use layout viewport (window.innerWidth/Height) so that user pinch-zoom
       does NOT trigger a re-layout that would cancel the zoom. */
    return {
        width: window.innerWidth,
        height: window.innerHeight
    };
}
/* User-level zoom/pan state on top of the auto-fit transform.
   This is what makes pinch-to-zoom and panning work without relying on
   the browser's visual viewport (which is disabled to prevent drift). */
let userScale = 1;
let userTx = 0;   /* in screen pixels */
let userTy = 0;   /* in screen pixels */
const USER_SCALE_MIN = 1;
const USER_SCALE_MAX = 4;

/* The "fit" transform: scale + translate that maps the 1366x768 stage
   into the visible window. Cached so input handlers can use it. */
let fitScale = 1, fitLeft = 0, fitTop = 0;

function layoutAppStage(){
    const viewport = document.getElementById('appViewport');
    const stage = document.getElementById('appStage');
    if(!viewport || !stage) return;
    const {width, height} = getViewportSize();
    fitScale = Math.min(width / STAGE_W, height / STAGE_H);
    fitLeft = Math.max(0, (width - STAGE_W * fitScale) / 2);
    fitTop = Math.max(0, (height - STAGE_H * fitScale) / 2);
    /* Compose: first the user pan/zoom (in screen space), then the fit. */
    const tx = fitLeft + userTx;
    const ty = fitTop + userTy;
    const s = fitScale * userScale;
    stage.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
    document.documentElement.style.setProperty('--stage-scale', String(s));
}

/* Total stage scale (screen px per stage px) — used by input handlers
   that need to convert between client and stage coordinates. */
function getTotalScale(){ return fitScale * userScale; }
function resetBarMagnetPosition(){
    const bm = document.getElementById('barMagnetEl');
    if(!bm) return;
    bm.style.left = '86px';
    bm.style.top = '72px';
}

/* ============================================================
   CONSTANTS
   ============================================================ */
const RO = 0.75;          // ring outer radius
const RI = 0.28;          // ring inner radius (bigger than pole so no clipping)
const RH = 0.32;          // ring height
const PR = 0.12;          // pole radius (thinner than ring hole)
const BY = 0.0;           // base Y (table surface)
const BT = 0.18;          // base thickness
const G_REP = 0.48;       // gap when repelling
const G_ATT = 0;          // gap when attracting (rings actually touch)
const G_PREVIEW = 0.12;   // preview gap while dragging above stacked ring
const STACK_PREVIEW_STEP = 1.70;
const C12 = [0xE53935, 0xFF8F00, 0xFDD835, 0x43A047, 0x1E88E5, 0x8E24AA];
const C3  = [0x1E88E5, 0x1E88E5, 0x1E88E5, 0x1E88E5, 0x1E88E5, 0x1E88E5];

/* Even spacing: 3 left, 3 right */
const LPOS = [{x:-4.0,z:2.0},{x:-5.5,z:0.0},{x:-4.0,z:-2.0}];
const RPOS = [{x:4.0,z:2.0},{x:5.5,z:0.0},{x:4.0,z:-2.0}];
const DROP_R = 3.5;
const DRAG_ELEV = 1.5;

/* ============================================================
   SOUND EFFECTS (Web Audio API)
   ============================================================ */
let audioCtx = null;
function getAudioCtx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playAttractSound(){
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
}

function playRepelSound(){
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.25);
}

function playFlipSound(){
    const ctx = getAudioCtx();
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(880, ctx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
    osc2.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
    osc2.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.16);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.18);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime + 0.1);
    osc2.start(ctx.currentTime + 0.06);
    osc2.stop(ctx.currentTime + 0.18);
}

function playCorrectSound(){
    const ctx = getAudioCtx();
    // 딩동댕! (C5 → E5 → G5) - bright ascending three-note chime
    const notes = [
        {freq: 523, time: 0,    dur: 0.18}, // 딩 (C5)
        {freq: 659, time: 0.14, dur: 0.18}, // 동 (E5)
        {freq: 784, time: 0.28, dur: 0.25}, // 댕 (G5) - slightly longer
    ];
    notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(n.freq, ctx.currentTime + n.time);
        gain.gain.setValueAtTime(0.28, ctx.currentTime + n.time);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur);
        osc.start(ctx.currentTime + n.time);
        osc.stop(ctx.currentTime + n.time + n.dur);
        // Add harmonics for bell-like ring
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(n.freq * 2, ctx.currentTime + n.time);
        gain2.gain.setValueAtTime(0.08, ctx.currentTime + n.time);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur * 0.6);
        osc2.start(ctx.currentTime + n.time);
        osc2.stop(ctx.currentTime + n.time + n.dur);
    });
}

function playWrongSound(){
    const ctx = getAudioCtx();
    // 뚜뚜 - two short descending low tones with rhythm
    const notes = [
        {freq: 330, time: 0,    dur: 0.15},  // 뚜 (E4)
        {freq: 262, time: 0.18, dur: 0.22},  // 뚜 (C4) - lower, slightly longer
    ];
    notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(n.freq, ctx.currentTime + n.time);
        gain.gain.setValueAtTime(0.22, ctx.currentTime + n.time);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur);
        osc.start(ctx.currentTime + n.time);
        osc.stop(ctx.currentTime + n.time + n.dur);
    });
}

function playSuccessSound(){
    const ctx = getAudioCtx();
    // 딩동댕동! 짧은 팡파레 (C5→E5→G5→C6) with rhythm
    const notes = [
        {freq: 523,  time: 0,    dur: 0.15}, // C5
        {freq: 659,  time: 0.13, dur: 0.15}, // E5
        {freq: 784,  time: 0.26, dur: 0.15}, // G5
        {freq: 1047, time: 0.42, dur: 0.35}, // C6 - hold longer
    ];
    notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(n.freq, ctx.currentTime + n.time);
        gain.gain.setValueAtTime(0.22, ctx.currentTime + n.time);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur);
        osc.start(ctx.currentTime + n.time);
        osc.stop(ctx.currentTime + n.time + n.dur);
        // Bell harmonics
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(n.freq * 2, ctx.currentTime + n.time);
        gain2.gain.setValueAtTime(0.06, ctx.currentTime + n.time);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur * 0.5);
        osc2.start(ctx.currentTime + n.time);
        osc2.stop(ctx.currentTime + n.time + n.dur);
    });
}

function playRetrySound(){
    const ctx = getAudioCtx();
    // 뚜루루 - three descending notes (G4→E4→C4) with gentle rhythm
    const notes = [
        {freq: 392, time: 0,    dur: 0.16}, // G4
        {freq: 330, time: 0.15, dur: 0.16}, // E4
        {freq: 262, time: 0.30, dur: 0.25}, // C4 - slightly longer
    ];
    notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(n.freq, ctx.currentTime + n.time);
        gain.gain.setValueAtTime(0.2, ctx.currentTime + n.time);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.time + n.dur);
        osc.start(ctx.currentTime + n.time);
        osc.stop(ctx.currentTime + n.time + n.dur);
    });
}

/* ============================================================
   SVG ASSETS
   ============================================================ */
const CAT_HTML = `<img src="./cat.png" alt="고양이 캐릭터" style="width:240px; height:auto; flex-shrink:0; display:block;">`;

const BAR_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 220" width="62" height="250">
<defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1565C0"/><stop offset="100%" stop-color="#42A5F5"/></linearGradient>
<linearGradient id="ng" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C62828"/><stop offset="100%" stop-color="#EF5350"/></linearGradient></defs>
<path d="M9,4 H47 Q52,4 52,9 V110 H4 V9 Q4,4 9,4 Z" fill="url(#sg)" stroke="#0D47A1" stroke-width="2"/>

function mkStand(){
    if(pStand) scene.remove(pStand);
    pStand = new THREE.Group();

    const baseMat = new THREE.MeshStandardMaterial({color:0xDEB887, roughness:0.55});
    const base = new THREE.Mesh(new THREE.CylinderGeometry(1.7, 1.7, BT, 48), baseMat);
    base.position.y = BY + BT/2;
    base.castShadow = true; base.receiveShadow = true;
    pStand.add(base);

    const poleMat = new THREE.MeshStandardMaterial({
        color: 0xD4A44C,
        roughness: 0.5,
        polygonOffset: true,
        polygonOffsetFactor: 2,
        polygonOffsetUnits: 2
    });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(PR, PR, 5.8, 24), poleMat);
    pole.position.y = BY + BT + 2.9;
    pole.castShadow = true;
    pole.renderOrder = 0;
    pStand.add(pole);

    const topCap = new THREE.Mesh(new THREE.SphereGeometry(PR*1.1, 16, 16), poleMat);
    topCap.position.y = BY + BT + 5.8;
    topCap.renderOrder = 0;
    pStand.add(topCap);

    scene.add(pStand);
}

/* ============================================================
   RING MAGNET - simple LatheGeometry
   ============================================================ */
let ringGeoCache = null;

function makeRingGeometry(){
    const pts = [];
    const n = 20, ro = RO, ri = RI, hh = RH/2;
    for(let i=0;i<=n;i++) pts.push(new THREE.Vector2(ri+(i/n)*(ro-ri), -hh));
    for(let i=0;i<=n;i++) pts.push(new THREE.Vector2(ro, -hh+(i/n)*2*hh));
    for(let i=0;i<=n;i++) pts.push(new THREE.Vector2(ro-(i/n)*(ro-ri), hh));
    for(let i=0;i<=n;i++) pts.push(new THREE.Vector2(ri, hh-(i/n)*2*hh));
    return new THREE.LatheGeometry(pts, 48);
}

function mkRing(col, tp, idx){
    if(!ringGeoCache) ringGeoCache = makeRingGeometry();

    const g = new THREE.Group();

    const mat = new THREE.MeshStandardMaterial({
        color: col,
        roughness: 0.35,
        metalness: 0.05
    });
    const mesh = new THREE.Mesh(ringGeoCache, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.renderOrder = 1;
    g.add(mesh);

    const bp = tp === 'N' ? 'S' : 'N';
    /* Top surface sticker label */
    const labelR = (RI + RO) * 0.42;
    const tl = mkLabel(tp);
    tl.position.set(0, RH/2 + 0.02, labelR);
    tl.visible = false; g.add(tl);

    /* Side labels (stickers on outer surface) */
    const sideTop = mkSideLabel(tp);
    sideTop.position.set(0, RH*0.25, 0);
    sideTop.visible = false; g.add(sideTop);

    const sideBot = mkSideLabel(bp);
    sideBot.position.set(0, -RH*0.25, 0);
    sideBot.visible = false; g.add(sideBot);

    /* Dashed midline (hidden until identified) */
    const poleVis = mkPoleVisualization(tp, bp);
    poleVis.visible = false;
    g.add(poleVis);

    g.userData = {
        type:'ring', index:idx,
        topPole:tp, bottomPole:bp,
        identified:false, onPole:false,
        topLabel:tl, sideTopLabel:sideTop, sideBotLabel:sideBot,
        bottomLabel:null, dashSprite:null,
        poleVis: poleVis,
        colorHex:col, attracts:false, originalPos:null,
        lastClickTime: 0
    };
    scene.add(g);
    return g;
}

/* Side label sticker (stuck on ring outer surface) */
function mkSideLabel(p){
    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 64;
    const c = cv.getContext('2d');
    /* Rounded rect sticker with white border */
    c.fillStyle = p==='N' ? 'rgba(229,57,53,0.95)' : 'rgba(21,101,192,0.95)';
    c.beginPath(); rR(c,4,4,120,56,14); c.fill();
    c.lineWidth = 3; c.strokeStyle = '#fff';
    c.beginPath(); rR(c,4,4,120,56,14); c.stroke();
    c.font = 'bold 36px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = '#FFF'; c.fillText(p+'극', 64, 34);

    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.MeshBasicMaterial({
        map: tex, transparent: true,
        depthTest: true, depthWrite: false,
        side: THREE.DoubleSide
    });
    /* Curved plane bent to ring outer surface */
    const arcSpan = 0.6;
    const segs = 12;
    const stickerH = RH * 0.42;
    const stickerR = RO + 0.01;
    const geom = new THREE.PlaneGeometry(1, stickerH, segs, 1);
    const pos = geom.attributes.position;
    for(let i = 0; i < pos.count; i++){
        const u = (pos.getX(i) + 0.5);
        const angle = (u - 0.5) * arcSpan;
        pos.setX(i, Math.sin(angle) * stickerR);
        pos.setZ(i, Math.cos(angle) * stickerR);
    }
    geom.computeVertexNormals();
    const mesh = new THREE.Mesh(geom, mat);
    mesh.renderOrder = 2;
    return mesh;
}

/* Create dashed midline circle + top/bottom colored bands */
function mkPoleVisualization(topPole, bottomPole){
    return new THREE.Group();
}

function mkLabel(p){
    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 128;
    const c = cv.getContext('2d');
    /* Round sticker */
    c.beginPath();
    c.arc(64, 64, 56, 0, Math.PI * 2);
    c.fillStyle = p==='N' ? '#E53935' : '#1565C0';
    c.fill();
    c.lineWidth = 5;
    c.strokeStyle = '#fff';
    c.stroke();
    /* Text */
    c.font = 'bold 54px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillStyle = '#FFF';
    c.fillText(p+'극', 64, 67);

    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.MeshBasicMaterial({
        map: tex, transparent: true,
        depthTest: true, depthWrite: false,
        side: THREE.DoubleSide
    });
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.45, 0.45), mat);
    plane.rotation.x = -Math.PI / 2; /* lie flat on top surface */
    plane.renderOrder = 2;
    return plane;
}
function rR(c,x,y,w,h,r){ c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function mkDash(){
    const cv = document.createElement('canvas');
    cv.width = 140; cv.height = 8;
    const c = cv.getContext('2d');
    c.strokeStyle = '#FFF'; c.lineWidth = 3; c.setLineDash([6,5]);
    c.beginPath(); c.moveTo(15,4); c.lineTo(125,4); c.stroke();
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(cv), transparent: true, depthTest: true, depthWrite: false
    }));
    sp.scale.set(0.65, 0.04, 1); sp.renderOrder = 2;
    return sp;
}
function refLabel(g){
    const u = g.userData;
    if(u.topLabel) g.remove(u.topLabel);
    if(u.bottomLabel) g.remove(u.bottomLabel);
    if(u.dashSprite) g.remove(u.dashSprite);
    if(u.sideTopLabel) g.remove(u.sideTopLabel);
    if(u.sideBotLabel) g.remove(u.sideBotLabel);
    if(u.poleVis) g.remove(u.poleVis);

    /* Top surface sticker */
    const labelR = (RI + RO) * 0.42;
    const tl = mkLabel(u.topPole);
    tl.position.set(0, RH/2 + 0.02, labelR);
    tl.visible = u.identified;
    g.add(tl);
    u.topLabel = tl;

    /* Side labels */
    const sideTop = mkSideLabel(u.topPole);
    sideTop.position.set(0, RH*0.25, 0);
    sideTop.visible = u.identified;
    g.add(sideTop);
    u.sideTopLabel = sideTop;

    const sideBot = mkSideLabel(u.bottomPole);
    sideBot.position.set(0, -RH*0.25, 0);
    sideBot.visible = u.identified;
    g.add(sideBot);
    u.sideBotLabel = sideBot;

    u.bottomLabel = null;
    u.dashSprite = null;

    const pv = mkPoleVisualization(u.topPole, u.bottomPole);
    pv.visible = u.identified;
    g.add(pv);
    u.poleVis = pv;
}

function setup(n){
    rings.forEach(g => scene.remove(g));
    rings = []; onPole = [];
    idCount = 0; pChecked = false; checking = false; bmActive = false;
    dragBM = false; dragRing = null; isDrag = false; isRot = false;
    attachRing = null; quizUp = false; ringGeoCache = null;
    physicsAnims = []; stackSim = null; settleAnim = null; wobbleAnim = null;
    mkStand();
    const cols = n===3 ? C3 : C12;
    let poles;
    if(n===1) poles = shuf(['N','N','N','S','S','S']);
    else if(n===2) poles = shuf(['S','N','S','N','S','N']);
    else poles = shuf(['N','S','N','S','N','S']);
    for(let i=0; i<6; i++){
        const p = i<3 ? LPOS[i] : RPOS[i-3];
        const r = mkRing(cols[i], poles[i], i);
        r.position.set(p.x, BY+RH/2+0.01, p.z);
        r.userData.originalPos = r.position.clone();
        rings.push(r);
    }
    cTheta=0; cPhi=Math.PI*0.38; cDist=14;
    updCam();
}
function shuf(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=0|Math.random()*(i+1); [b[i],b[j]]=[b[j],b[i]]; } return b; }

/* ============================================================
   CAT - uses generation counter to prevent stale callback issues
   ============================================================ */
let catLocked = false;
let catGeneration = 0; /* incremented each time showCat is called */
let catHideTimer = null;
let catVoiceAudio = null;

function cancelCat(){
    catGeneration++;
    if(catHideTimer){ clearTimeout(catHideTimer); catHideTimer=null; }
    if('speechSynthesis' in window) speechSynthesis.cancel();
    if(catVoiceAudio){
        catVoiceAudio.pause();
        catVoiceAudio.currentTime = 0;
        catVoiceAudio = null;
    }
    if(bgm && bgmPlaying) bgm.volume = 0.13;
    const w = document.getElementById('catWrap');
    w.style.display='none';
    w.style.pointerEvents='none';
    catLocked=false;
}

function showCat(msg, side, autoHideAfterSpeech, onDone, audioFile){
    cancelCat(); /* cancel any previous cat */
    const gen = ++catGeneration;
    const w = document.getElementById('catWrap');
    w.innerHTML = '<div class="bubble">' + msg + '</div>' + CAT_HTML;
    w.style.display = 'flex'; w.style.alignItems = 'center';
    w.style.left = '50%'; w.style.right = 'auto'; w.style.bottom = 'auto'; w.style.top = '50%';
    w.style.pointerEvents = 'auto';
    catLocked = true;

    const hideWrap = () => {
        if(gen !== catGeneration) return; /* stale - ignore */
        w.style.display='none';
        w.style.pointerEvents = 'none';
        catLocked = false;
        if('speechSynthesis' in window) speechSynthesis.cancel();
        if(catVoiceAudio){
            catVoiceAudio.pause();
            catVoiceAudio.currentTime = 0;
            catVoiceAudio = null;
        }
        if(onDone) onDone();
    };

    /* Lower BGM while speaking */
    if(bgm && bgmPlaying) bgm.volume = 0.05;

    if(audioFile){
        catVoiceAudio = new Audio(audioFile);
        catVoiceAudio.onended = ()=>{
            if(bgm && bgmPlaying) bgm.volume = 0.13;
            if(gen !== catGeneration) return;
            if(autoHideAfterSpeech){
                hideWrap();
            } else {
                catHideTimer = setTimeout(hideWrap, 1500);
            }
        };
        catVoiceAudio.onerror = ()=>{
            if(catVoiceAudio){
                catVoiceAudio = null;
            }
            if('speechSynthesis' in window){
                const u = new SpeechSynthesisUtterance(msg);
                u.lang='ko-KR';
                u.rate = 1.15;
                u.pitch = 2.0;
                u.volume = 1.0;

                const voices = speechSynthesis.getVoices();
                const koVoice = voices.find(v => v.lang.startsWith('ko') && /female|여|child|아이/i.test(v.name))
                              || voices.find(v => v.lang.startsWith('ko'));
                if(koVoice) u.voice = koVoice;

                u.onend = ()=>{
                    if(bgm && bgmPlaying) bgm.volume = 0.13;
                    if(gen !== catGeneration) return;
                    if(autoHideAfterSpeech){
                        hideWrap();
                    } else {
                        catHideTimer = setTimeout(hideWrap, 1500);
                    }
                };
                speechSynthesis.speak(u);
            }
        };
        catVoiceAudio.play().catch(()=>{
            if(catVoiceAudio){
                catVoiceAudio = null;
            }
            if('speechSynthesis' in window){
                const u = new SpeechSynthesisUtterance(msg);
                u.lang='ko-KR';
                u.rate = 1.15;
                u.pitch = 2.0;
                u.volume = 1.0;

                const voices = speechSynthesis.getVoices();
                const koVoice = voices.find(v => v.lang.startsWith('ko') && /female|여|child|아이/i.test(v.name))
                              || voices.find(v => v.lang.startsWith('ko'));
                if(koVoice) u.voice = koVoice;

                u.onend = ()=>{
                    if(bgm && bgmPlaying) bgm.volume = 0.13;
                    if(gen !== catGeneration) return;
                    if(autoHideAfterSpeech){
                        hideWrap();
                    } else {
                        catHideTimer = setTimeout(hideWrap, 1500);
                    }
                };
                speechSynthesis.speak(u);
            }
        });
    } else if('speechSynthesis' in window){
        const u = new SpeechSynthesisUtterance(msg);
        u.lang='ko-KR';
        u.rate = 1.15;    /* slightly fast - cute child cadence */
        u.pitch = 2.0;    /* maximum pitch for highest child-like voice */
        u.volume = 1.0;   /* max volume */

        /* Prefer female/child Korean voice */
        const voices = speechSynthesis.getVoices();
        const koVoice = voices.find(v => v.lang.startsWith('ko') && /female|여|child|아이/i.test(v.name))
                      || voices.find(v => v.lang.startsWith('ko'));
        if(koVoice) u.voice = koVoice;

        u.onend = ()=>{
            if(bgm && bgmPlaying) bgm.volume = 0.13;
            if(gen !== catGeneration) return;
            if(autoHideAfterSpeech){
                hideWrap();
            } else {
                catHideTimer = setTimeout(hideWrap, 1500);
            }
        };
        speechSynthesis.speak(u);
    }

    /* Fallback if speech/audio never fires onend */
    catHideTimer = setTimeout(()=>{
        if(gen === catGeneration && w.style.display !== 'none') hideWrap();
    }, 15000);
}

function startPoleCheck(){
    checking=true; bmActive=true;
    const cpb = document.getElementById('checkPoleBtn');
    cpb.classList.add('no-pulse');
    cpb.style.display = 'none';
    document.getElementById('catWrap').style.display = 'none';
    if('speechSynthesis' in window) speechSynthesis.cancel();

    showCat('막대자석을 고리 자석의 윗면에 가까이 하세요.', 'center', true, null, './cat_voice_2.mp3');

    const bm = document.getElementById('barMagnetEl');
    bm.innerHTML = BAR_SVG; bm.style.display = 'block';

    /* Position bar magnet in upper-left area (matching screenshot) */
    requestAnimationFrame(()=>{
        resetBarMagnetPosition();
        updateBarMagnetScale();
    });

    const startBarMagnetDrag = e=>{
        if(quizUp) return;
        /* Multi-touch belongs to the pinch handler, not the magnet drag. */
        if(e.touches && e.touches.length > 1) return;
        const pt = e.touches ? e.touches[0] : e;
        const stage = document.getElementById('appStage');
        const sr = stage.getBoundingClientRect();
        const s = getTotalScale() || 1;
        /* Convert pointer client coords -> stage-local coords */
        const stageX = (pt.clientX - sr.left) / s;
        const stageY = (pt.clientY - sr.top)  / s;
        dragBM = true;
        bmOX = stageX - bm.offsetLeft;
        bmOY = stageY - bm.offsetTop;
        bm.style.cursor = 'grabbing';
        e.preventDefault();
    };
    bm.onpointerdown = startBarMagnetDrag;
    bm.ontouchstart = startBarMagnetDrag;
    bm.onmousedown = startBarMagnetDrag;
}

/* ============================================================
   BAR MAGNET DETECTION
   ============================================================ */
function checkBMAboveRing(){
    if(!bmActive || !dragBM || quizUp || attachRing) return;
    const bm = document.getElementById('barMagnetEl');
    const br = bm.getBoundingClientRect();
    const bmCX = br.left + br.width / 2;
    const bmBY = br.bottom;

    const rect = ren.domElement.getBoundingClientRect();

    let hitG = null;
    let minDist = Infinity;
    let hitRSY = 0;
    for(const g of rings){
        if(g.userData.identified) continue;
        const topPoint = new THREE.Vector3(g.position.x, g.position.y + RH / 2, g.position.z).project(cam);
        const rsx = (topPoint.x * 0.5 + 0.5) * rect.width + rect.left;
        const rsy = (-topPoint.y * 0.5 + 0.5) * rect.height + rect.top;

        const dx = Math.abs(bmCX - rsx);
        if(dx > 26) continue;

        const dy = rsy - bmBY;
        if(dy < -6 || dy > 24) continue;

        const dist = Math.sqrt(dx * dx + dy * dy);
        if(dist < minDist){ minDist = dist; hitG = g; hitRSY = rsy; }
    }
    if(!hitG) return;

    const same = ('N' === hitG.userData.topPole);
    dragBM = false; bm.style.cursor = 'grab';

    if(same){
        playRepelSound();
        const ct = parseInt(bm.style.top) || 100;
        bm.style.transition = 'top 0.35s ease-out';
        bm.style.top = (ct - 70) + 'px';
        setTimeout(()=>{ bm.style.transition=''; }, 350);
        setTimeout(()=> showQuiz(hitG), 400);
    } else {
        playAttractSound();
        attachRing = hitG; attachOrigY = hitG.position.y;

        /* Goal: ring's S-pole top face touches bar magnet's N-pole tip exactly.
           Strategy: use an invisible 1×1 marker rect placed inside the SVG at the exact
           visible N-pole tip (viewBox y=216.5, the center of the bottom stroke). Its
           getBoundingClientRect() gives the tip's true screen position with ALL
           transforms — SVG preserveAspectRatio letterboxing, the bar magnet's CSS
           transform: scale(), and the appStage scale — already baked in. No math
           required, so no rounding error. We then unproject that screen point onto
           the ring's z-plane to get the exact world coordinates. */
        const tipEl = document.getElementById('bmTipMarker');
        const tipRect = tipEl.getBoundingClientRect();
        const tipScreenX = tipRect.left + tipRect.width / 2;
        const tipScreenY = tipRect.top + tipRect.height / 2;

        /* Convert tip screen coords to NDC, then unproject onto ring's z-plane.
           We use a ray from the camera through the tip and intersect it with the
           plane z = hitG.position.z (rings live on that plane). */
        const ndcX = ((tipScreenX - rect.left) / rect.width) * 2 - 1;
        const ndcY = -((tipScreenY - rect.top) / rect.height) * 2 + 1;
        const tipRay = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(cam).sub(cam.position).normalize();
        const ringZ = hitG.position.z;
        const tParam = (ringZ - cam.position.z) / tipRay.z;
        const tipWorld = cam.position.clone().add(tipRay.multiplyScalar(tParam));

        /* Ring CENTER target = tip world position with Y shifted down by RH/2
           (so the ring's TOP face — at center.y + RH/2 — meets the tip exactly) */
        const targetX = tipWorld.x;
        const targetY = tipWorld.y - RH / 2;

        /* Smooth animation: ring slides to bar magnet over 250ms (X and Y together) */
        const startX = hitG.position.x;
        const startY = hitG.position.y;
        const animStart = performance.now();
        const animDur = 250;
        const attractAnim = {
            ring: hitG,
            update: (now) => {
                const t = Math.min(1, (now - animStart) / animDur);
                /* Ease-out: fast start, slow end (like magnetic pull) */
                const ease = 1 - (1 - t) * (1 - t);
                hitG.position.x = startX + (targetX - startX) * ease;
                hitG.position.y = startY + (targetY - startY) * ease;
                if(t >= 1){
                    hitG.position.x = targetX;
                    hitG.position.y = targetY;
                    return true;
                }
                return false;
            }
        };
        physicsAnims.push(attractAnim);
        setTimeout(()=> showQuiz(hitG), 350);
    }
}

    });

/* ============================================================
   MOUSE EVENTS
   ============================================================ */

let dragDepth = 10;

function getClientPoint(e){
    return e.touches ? e.touches[0] : e;
}

document.addEventListener('pointermove', e=>{
    const pt = getClientPoint(e);
    if(dragBM){
        const bm = document.getElementById('barMagnetEl');
        const stage = document.getElementById('appStage');
        const sr = stage.getBoundingClientRect();
        const s = getTotalScale() || 1;
        const stageX = (pt.clientX - sr.left) / s;
        const stageY = (pt.clientY - sr.top)  / s;
        bm.style.left = (stageX - bmOX) + 'px';
        bm.style.top  = (stageY - bmOY) + 'px';
        checkBMAboveRing();
        return;
    }
    if(dragRing && isDrag){
        return;
    }
    if(isRot){
        cTheta += (pt.clientX-pmx)*0.005;
        const maxTheta = Math.PI/6;
        cTheta = Math.max(-maxTheta, Math.min(maxTheta, cTheta));
        cPhi = Math.max(0.25, Math.min(Math.PI*0.48, cPhi-(pt.clientY-pmy)*0.005));
        updCam(); pmx=pt.clientX; pmy=pt.clientY;
    }
});

document.addEventListener('pointerup', e=>{
    if(dragBM){ dragBM=false; document.getElementById('barMagnetEl').style.cursor='grab'; return; }
    if(dragRing && isDrag){
        dropOnPoleWithPhysics(dragRing);
        dragRing=null; isDrag=false; return;
    }
    isRot = false;
});

function onDown(e){
    const pt = getClientPoint(e);
    if(dragBM || quizUp || catLocked || !ren) return;
    /* If a second finger is down (pinch), let the browser handle zoom — don't start a drag. */
    if(e.touches && e.touches.length > 1) return;
    const rect = ren.domElement.getBoundingClientRect();
    mse.set(((pt.clientX-rect.left)/rect.width)*2-1, -((pt.clientY-rect.top)/rect.height)*2+1);
    ray.setFromCamera(mse, cam);
    const ch = []; rings.forEach(g=>{ if(g.children[0]) ch.push(g.children[0]); });
    const hits = ray.intersectObjects(ch);
    if(hits.length > 0){
        const hg = hits[0].object.parent;
        if(pChecked){
            /* If ring is on pole, drag it off back to original position */
            if(hg.userData.onPole){
                removeRingFromPole(hg);
                return;
            }
            const sx=pt.clientX, sy=pt.clientY; let moved=false;
            const onMv = me=>{
                const mv = getClientPoint(me);
                if(Math.abs(mv.clientX-sx)>5 || Math.abs(mv.clientY-sy)>5){
                    moved=true; document.removeEventListener('pointermove', onMv);
                    isDrag=true; dragRing=hg;

                    /* Immediately snap ring to pole top position */
                    const poleTopY = BY + BT + 5.8;
                    let snapY = poleTopY;
                    if(onPole.length > 0){
                        const topRing = onPole[onPole.length - 1];
                        const minAbove = topRing.position.y + RH + G_REP;
                        snapY = Math.max(snapY, minAbove);
                    }
                    hg.position.set(0, snapY, 0);
                }
            };
            const onUp = ()=>{
                document.removeEventListener('pointermove',onMv);
                document.removeEventListener('pointerup',onUp);
                if(!moved){
                    /* Double-click to flip ring */
                    const now = Date.now();
                    const lastClick = hg.userData.lastClickTime || 0;
                    if(now - lastClick < 400){
                        flipRing(hg);
                        playFlipSound();
                        hg.userData.lastClickTime = 0;
                    } else {
                        hg.userData.lastClickTime = now;
                    }
                }
            };
            document.addEventListener('pointermove', onMv);
            document.addEventListener('pointerup', onUp, {once:true});
            return;
        }
    }
    isRot=true; pmx=pt.clientX; pmy=pt.clientY;
}

function onWheel(e){
    cDist += e.deltaY*0.008;
    cDist = Math.max(6, Math.min(24, cDist));
    updCam();
}

/* ============================================================
   Remove ring from pole - click to remove back to original position
   ============================================================ */
function removeRingFromPole(ring){
    const idx = onPole.indexOf(ring);
    if(idx === -1) return;
    // Remove this ring and all rings above it
    const removedRings = onPole.splice(idx);
    removedRings.forEach(r=>{
        r.userData.onPole = false;
        r.userData.attracts = false;
        r.userData.vy = 0;
        r.userData.anchored = false;
        r.userData.settled = false;
        r.userData.settleTargetY = undefined;
        r.position.copy(r.userData.originalPos);
    });
    recomputeAttractsFlags();
    /* Stop any running simulation. */
    physicsAnims = physicsAnims.filter(a => a !== stackSim && a !== wobbleAnim);
    stackSim = null;
    wobbleAnim = null;
    /* Smoothly resettle remaining rings into their new equilibrium.
       placeSettledRings() treats the LAST ring as "active" and skips it, but
       on removal we want EVERY remaining ring to reposition. Trick: append a
       harmless sentinel that stands in as the active ring, run the placer,
       then strip the sentinel. */
    if(onPole.length > 0){
        const sentinel = { userData: { topPole: 'N', bottomPole: 'N', onPole: false } };
        onPole.push(sentinel);
        placeSettledRings();
        onPole.pop();
    }
}

/* ============================================================
   Drop from top with physics simulation
   ============================================================ */
function getPreviewPlacement(){
    if(onPole.length===0){
        return { x:0, z:0, y:BY + BT + RH/2, attracts:false };
    }
    const prev = onPole[onPole.length-1];
    return {
        x:0,
        z:0,
        y:prev.position.y + STACK_PREVIEW_STEP,
        attracts:false
    };
}

/* ============================================================
   UNIFIED PHYSICS SIMULATOR
   - Gravity acts on every ring stacked on the pole
   - Every PAIR of stacked rings exerts a magnetic force on each other
     (same poles facing => repel, opposite poles facing => attract)
   - Pole base acts as a hard floor; rings cannot pass through each other
   - When the system settles (all velocities small), checkWin() fires
   ============================================================ */

/* Physics constants (simplified single-active-ring model)
   The model is intentionally simple: only one ring is "active" (in motion) at
   a time — the most recently dropped one. Every other ring on the pole is
   already at its analytic equilibrium position and does not move. */
const PHYS_GRAVITY      = 26.0;    // gravity acceleration (world units / s^2)
const PHYS_MAG_STRENGTH = 6.5;     // magnetic force coefficient (per pair) — also sets the repel equilibrium gap
const PHYS_MAG_RANGE    = 3.5;     // beyond this gap, pair force ≈ 0
const PHYS_DAMPING      = 0.978;   // per-frame velocity damping (air drag)
const PHYS_DAMPING_SLOW = 0.92;    // extra-strong damping when velocity is small
const PHYS_SLOW_THRESH  = 0.8;     // velocity below this gets stronger damping
const PHYS_MIN_GAP      = G_ATT;   // attractive pair: minimum (touching) gap
const PHYS_SETTLE_VEL   = 0.10;    // |vy| below this counts as "at rest"
const PHYS_MAX_DT       = 0.02;    // clamp dt to avoid explosions on tab switch
const PHYS_STICK_GAP    = 0.04;    // attractive: surface gap below this triggers stick & end-of-fall
const PHYS_VEL_CAP      = 8.0;     // terminal-velocity-style cap on |vy|

/* Reference to the active simulation. */
let stackSim = null;
/* Reference to the smooth-resettle animation (separate from stackSim).
   When new weight is added/removed, the previously-settled rings need to
   ease into their new equilibrium positions instead of snapping there. */
let settleAnim = null;
/* Reference to the brief decay-wobble animation that runs after settleAnim
   finishes — gives a "magnets reacting" feel by sinusoidally bouncing each
   floating ring around its target with an exponential amplitude decay. */
let wobbleAnim = null;

function dropOnPoleWithPhysics(r){
    r.userData.onPole = true;
    r.userData.settled = false; // brand-new ring is in motion (the "active" ring)
    onPole.push(r);

    /* Drop ALWAYS starts from the top of the pole, but slightly BELOW the
       ceiling clamp so a tall repel oscillation doesn't immediately collide
       with the ceiling and lose its kinetic energy. */
    const dropStartY = BY + BT + 5.4;
    r.position.set(0, dropStartY, 0);
    r.userData.vy = 0;

    /* Decide which sound to play based on the topmost neighbor at drop time */
    if(onPole.length >= 2){
        const below = onPole[onPole.length - 2];
        const facingSame = (below.userData.topPole === r.userData.bottomPole);
        if(facingSame) playRepelSound(); else playAttractSound();
    } else {
        playAttractSound();
    }

    /* Refresh the static "attracts" flags used by the win checker. */
    recomputeAttractsFlags();

    /* Snap every previously-settled ring to its analytic equilibrium position
       under the new total stack (the freshly added ring's weight may shift
       the lower repel gaps, so we recompute from scratch). The active ring is
       NOT placed here — it falls from the top of the pole under simulation. */
    placeSettledRings();

    /* Start the simulation. The active ring is the one we just added. */
    startStackSimulation();
}

/* === Analytic equilibrium calculator (smooth) ===
   Compute the target Y position for every settled ring (everyone except the
   active one at the top of onPole) and start a brief easing animation that
   slides them from where they are now to where they belong. This avoids the
   visual "jump" when a new ring is added and the gaps below need to adjust. */
/* === [VERSION B] 합산 자기력 평형점 계산기 ===
   여러 자석이 서로 영향을 주는 상황에서 각 자석의 진짜 평형점은
   닫힌 공식으로 풀 수 없다(여러 1/gap²의 합 = 그 자석 위에 얹힌 무게).
   그래서 수치적으로 푼다.
   
   approach: 각 자석의 위치를 변수로 놓고, "자기 위 모든 자석을 합한 자기력
   = 자기 자신의 무게 + 자기 위에 쌓인 자석 무게 합" 조건이 충족될 때까지
   위에서부터 차례로 z=0이 되는 gap을 이분법으로 찾는다. */
function solveEquilibriumGap(weightAbove, magStrength, gravity){
    /* 활성 자석 한 개 위에 weightAbove 만큼의 무게가 더 얹혔을 때
       바로 아래 자석과 활성 자석 사이의 평형 gap을 찾는다.
       
       조건: pairMagneticForce(lower→upper) = (1+weightAbove) * gravity
       즉  magStrength / (gap+eps)^2 = (1+weightAbove) * gravity
       
       weightAbove는 활성 위에 더 쌓인 자석 수. 활성 자체의 무게 1을 더한다. */
    const totalWeight = (1 + weightAbove) * gravity;
    const eps = 0.05;
    /* magStrength / (gap+eps)^2 = totalWeight  →  gap = sqrt(magStrength/totalWeight) - eps */
    let gap = Math.sqrt(magStrength / totalWeight) - eps;
    if(gap < 0.05) gap = 0.05;
    return gap;
}

/* 다중 자석 합산을 고려한 진짜 평형점 — 여러 아래 자석들이 모두 활성 자석을
   밀어올릴 때, 각각의 1/gap² 합 = 무게 가 되는 활성의 y를 이분법으로 찾는다. */
function solveActiveEquilibriumY(activeIdx, ringsBelow, weightAbove){
    /* ringsBelow: [{y, samePoleAsActiveBottom}] 활성 자석보다 아래에 있는 자석들 */
    const totalGravity = (1 + weightAbove) * PHYS_GRAVITY;
    const eps = 0.05;
    
    function netUpwardForce(activeY){
        let f = 0;
        for(const rb of ringsBelow){
            const gap = (activeY - rb.y) - RH;
            if(gap < -RH * 0.4) return Infinity; // 너무 겹치면 +∞
            const safeGap = Math.max(gap, -RH * 0.4);
            const mag = PHYS_MAG_STRENGTH / ((Math.abs(safeGap)+eps) * (Math.abs(safeGap)+eps));
            const taper = Math.max(0, 1 - gap / PHYS_MAG_RANGE);
            const sign = rb.samePoleAsActiveBottom ? +1 : -1; // same → 밀어올림(+)
            f += sign * mag * taper;
        }
        return f - totalGravity; // 위로 가는 알짜힘 - 무게
    }
    
    /* 가장 가까운 아래 자석 위 0.05 ~ 그 위 5.0 사이에서 이분법 */
    if(ringsBelow.length === 0) return null;
    const topBelow = ringsBelow.reduce((a,b) => a.y > b.y ? a : b);
    let lo = topBelow.y + RH + 0.05;
    let hi = topBelow.y + RH + 5.0;
    let fLo = netUpwardForce(lo);
    let fHi = netUpwardForce(hi);
    /* lo에서는 자석들이 위로 강하게 밀어올림 → fLo > 0
       hi에서는 자기력이 약해서 무게에 짐 → fHi < 0 */
    if(fLo < 0 || fHi > 0) return null; // 평형점 없음(부호 안 바뀜)
    
    for(let it=0; it<60; it++){
        const mid = 0.5 * (lo + hi);
        const fMid = netUpwardForce(mid);
        if(Math.abs(fMid) < 1e-6) return mid;
        if(fMid > 0) lo = mid; else hi = mid;
    }
    return 0.5 * (lo + hi);
}

function placeSettledRings(includeActive){
    if(onPole.length === 0) return;
    /* === [VERSION B FIX] ===
       모든 자석의 합산 자기장 기반으로 진짜 평형 위치를 계산.
       위에서부터 차례로 푸는 게 아니라, 아래에서부터 차례로 푼다.
       각 자석의 평형 = 자기 아래 모든 자석들로부터의 합산 밀어내는 힘이
                        자기 + 자기 위 모든 자석들의 무게와 같아지는 위치. */
    const settledCount = includeActive ? onPole.length : onPole.length - 1;
    if(settledCount <= 0) return;

    const targets = new Array(settledCount);
    const baseY = BY + BT + RH/2;
    targets[0] = baseY; // 가장 아래는 항상 받침대 위

    for(let i=1; i<settledCount; i++){
        const upper = onPole[i];
        // 이 자석보다 아래에 있는 모든 자석을 합산
        const ringsBelow = [];
        for(let j=0; j<i; j++){
            const lower = onPole[j];
            const samePoleAsUpperBottom = (lower.userData.topPole === upper.userData.bottomPole);
            ringsBelow.push({ y: targets[j], samePoleAsActiveBottom: samePoleAsUpperBottom });
        }
        const weightAbove = settledCount - i - 1; // 이 자석 위에 얹힌 자석 수
        
        // 가장 가까운 아래 자석과 같은 극인지로 끌어당김/밀어냄 분기
        const nearest = onPole[i-1];
        const samePoles = (nearest.userData.topPole === upper.userData.bottomPole);
        
        if(!samePoles){
            // 끌어당김 → 붙어버림
            targets[i] = targets[i-1] + RH + PHYS_MIN_GAP;
        } else {
            // 밀어냄 → 합산 평형점을 수치로 찾기
            const eqY = solveActiveEquilibriumY(i, ringsBelow, weightAbove);
            if(eqY !== null){
                targets[i] = eqY;
            } else {
                // 폴백: 단일 쌍 공식 (가장 가까운 아래 자석만 고려)
                const gap = solveEquilibriumGap(weightAbove, PHYS_MAG_STRENGTH, PHYS_GRAVITY);
                targets[i] = targets[i-1] + RH + gap;
            }
        }
    }

    /* === [VERSION B FIX 2] 이미 정착한 자석들은 가능한 한 그 자리를 유지 ===
       위에 자석이 더 쌓일 때 아래 자석들을 합산 평형점으로 새로 계산하면
       그 결과가 시뮬레이션이 정착한 위치와 약간 다를 수 있다. 그 차이가
       물리적으로 자연스러운 방향(아래로)이라면 허용하지만, 위로 올라가는
       건 물리적으로 잘못된 결과이므로 막는다.
       
       이미 settleTargetY가 있는 자석은 새 계산값과 기존값 중 "더 아래쪽"을
       선택한다. 이렇게 하면 위로 올라가는 일이 절대 일어나지 않는다. */
    for(let i=1; i<settledCount; i++){
        const r = onPole[i];
        if(typeof r.userData.settleTargetY === 'number'){
            // 새 계산값이 기존값보다 위라면 → 기존값 유지 (위로 안 올라감)
            // 새 계산값이 기존값보다 아래라면 → 새 값 사용 (자연스러운 눌림)
            if(targets[i] > r.userData.settleTargetY){
                targets[i] = r.userData.settleTargetY;
            }
        }
    }

    /* Snapshot starting Y positions and start the smooth animation. */
    const settledRings = onPole.slice(0, settledCount);
    const startY = settledRings.map(r => r.position.y);

    /* Cancel any running settle/wobble animation. */
    physicsAnims = physicsAnims.filter(a => a !== settleAnim && a !== wobbleAnim);
    wobbleAnim = null;

    const duration = 0.4;
    const startTime = performance.now();

    settleAnim = {
        ring: null,
        update: (now) => {
            const t = Math.min(1, (now - startTime) / 1000 / duration);
            const e = t < 0.5
                ? 4 * t * t * t
                : 1 - Math.pow(-2 * t + 2, 3) / 2;
            for(let i=0; i<settledRings.length; i++){
                const r = settledRings[i];
                if(!r.userData.onPole) continue;
                r.userData.settleTargetY = targets[i];
                r.position.y = startY[i] + (targets[i] - startY[i]) * e;
            }
            if(t >= 1){
                for(let i=0; i<settledRings.length; i++){
                    const r = settledRings[i];
                    if(!r.userData.onPole) continue;
                    r.position.y = targets[i];
                    r.userData.settleTargetY = targets[i];
                }
                settleAnim = null;
                if(!stackSim) startDecayWobble();
                return true;
            }
            return false;
        }
    };
    physicsAnims.push(settleAnim);
}

/* === Decay wobble ===
   After every ring has reached its analytic equilibrium (settleAnim done),
   run a short sine wobble whose amplitude exponentially decays to zero.
   The wobble is applied to every non-anchored ring (i.e. every ring NOT
   chained back to the base by attractive bonds — anchored rings stay still
   because they're held firm by the base).
   - Math: y(t) = settleTargetY + A · sin(ω·t) · exp(-t/τ)
   - At t=0, sin(0) = 0 → no jump from settleTargetY
   - As t grows, exp(-t/τ) shrinks → amplitude fades to zero
   - At end, y is exactly settleTargetY again, no residual offset

   ATTRACTIVE bonds: rings glued together must wobble TOGETHER — they share
   one common phase/amplitude so they look like one rigid body. We compute
   that phase using the lowest non-anchored ring of each connected group.
   This ensures attractive pairs never visually separate during the wobble. */
const WOBBLE_AMP    = 0.03;   // peak displacement (world units)
const WOBBLE_HZ     = 1.5;    // oscillation frequency
const WOBBLE_TAU    = 0.6;    // amplitude decay time-constant (1/e per τ seconds)
const WOBBLE_TOTAL  = 2.2;    // total duration before snapping to rest

function startDecayWobble(){
    /* Cancel any prior wobble animation. */
    physicsAnims = physicsAnims.filter(a => a !== wobbleAnim);
    if(onPole.length === 0){ wobbleAnim = null; return; }

    /* Identify anchored chain (attractive-bond chain back to base).
       Anchored rings DO NOT wobble. */
    const anchored = new Array(onPole.length).fill(false);
    anchored[0] = true;
    for(let i=1; i<onPole.length; i++){
        const below = onPole[i-1];
        const here  = onPole[i];
        const attractive = (below.userData.topPole !== here.userData.bottomPole);
        anchored[i] = anchored[i-1] && attractive;
    }

    /* Group rings into "wobble groups": each group is a maximal run of
       consecutive non-anchored rings whose adjacent pairs are attractive
       (i.e. they're bonded). A repel pair starts a new group because the
       two rings are physically separated and free to wobble independently.

       Examples (A=attract, R=repel pair below):
         anchor anchor R . A . A    →  groups: [2,3,4] (one group of 3)
         anchor R . R . R .         →  groups: [1], [2], [3]
         anchor R . A . R .         →  groups: [1,2], [3]
       Each group gets its own sine: same phase across all members so
       attractive bonds stay glued. */
    const groups = [];
    let cur = null;
    for(let i=0; i<onPole.length; i++){
        if(anchored[i]){
            if(cur){ groups.push(cur); cur = null; }
            continue;
        }
        const startNewGroup = !cur ||
            /* The pair (cur.last, i) is attractive iff topPole(cur.last) != bottomPole(i). */
            (onPole[i-1].userData.topPole === onPole[i].userData.bottomPole);
            /* same poles = repel = new group */
        if(startNewGroup){
            if(cur) groups.push(cur);
            cur = [i];
        } else {
            cur.push(i);
        }
    }
    if(cur) groups.push(cur);

    if(groups.length === 0){ wobbleAnim = null; return; }

    /* All groups start at phase=0 so sin(0)=0 → no jump from settleTargetY.
       (Earlier per-group phases caused the wobble to start at sin(phase)≠0,
       which displaced the ring from its target on the very first frame.) */
    const groupPhases = groups.map(g => 0);

    /* DEBUG: log each ring's settleTargetY at wobble start to verify they
       are correctly positioned at their analytic equilibrium. */
    let dbg = '[D] wobble start, groups='+JSON.stringify(groups)+' targets:';
    for(let i=0; i<onPole.length; i++){
        const r = onPole[i];
        const t = r.userData.settleTargetY;
        dbg += ' r#'+r.userData.index+'(y='+r.position.y.toFixed(3)+',target='+(t===undefined?'?':t.toFixed(3))+',anc='+(anchored[i]?1:0)+')';
    }
    console.log(dbg);

    const startTime = performance.now();
    let lastLogTime = 0;

    wobbleAnim = {
        ring: null,
        update: (now) => {
            const elapsed = (now - startTime) / 1000;
            if(elapsed >= WOBBLE_TOTAL){
                /* Snap to exact targets and end. */
                let dbgEnd = '[D] wobble end:';
                for(let i=0; i<onPole.length; i++){
                    const r = onPole[i];
                    if(typeof r.userData.settleTargetY === 'number'){
                        r.position.y = r.userData.settleTargetY;
                        dbgEnd += ' r#'+r.userData.index+'='+r.userData.settleTargetY.toFixed(3);
                    }
                }
                console.log(dbgEnd);
                wobbleAnim = null;
                return true;
            }
            /* Log every 0.5s during wobble. */
            if(elapsed - lastLogTime > 0.5){
                lastLogTime = elapsed;
                let mid = '[D] wobble t='+elapsed.toFixed(2)+':';
                for(let i=0; i<onPole.length; i++){
                    const r = onPole[i];
                    const t = r.userData.settleTargetY;
                    mid += ' r#'+r.userData.index+'(y='+r.position.y.toFixed(3)+',t='+(t===undefined?'?':t.toFixed(3))+')';
                }
                console.log(mid);
            }
            /* For each group, compute one shared offset and apply to all
               members so attractive pairs move together. */
            const decay = Math.exp(-elapsed / WOBBLE_TAU);
            for(let gi=0; gi<groups.length; gi++){
                const phase = groupPhases[gi];
                const dy = WOBBLE_AMP * Math.sin(2 * Math.PI * WOBBLE_HZ * elapsed + phase) * decay;
                for(const idx of groups[gi]){
                    const r = onPole[idx];
                    if(typeof r.userData.settleTargetY !== 'number') continue;
                    r.position.y = r.userData.settleTargetY + dy;
                }
            }
            return false;
        }
    };
    physicsAnims.push(wobbleAnim);
}



/* attracts[i] = true iff ring i's bottom pole is opposite to ring (i-1)'s top pole.
   This is the static "are these neighbors stuck together" flag used by checkWin. */
function recomputeAttractsFlags(){
    for(let i=0; i<onPole.length; i++){
        if(i === 0){ onPole[i].userData.attracts = false; continue; }
        const prev = onPole[i-1];
        const cur  = onPole[i];
        cur.userData.attracts = (prev.userData.topPole !== cur.userData.bottomPole);
    }
}

/* Pairwise magnetic force between two stacked rings.
   Returns the vertical force the UPPER ring receives from the LOWER ring.
   Positive => pushes upper ring UP (repulsion).
   Negative => pulls upper ring DOWN (attraction).
   The lower ring receives the equal-and-opposite force (Newton's 3rd law). */
function pairMagneticForce(lower, upper){
    /* Center-to-center distance along Y. Subtract ring height once so the
       "gap" is the surface-to-surface separation. */
    const gap = (upper.position.y - lower.position.y) - RH;
    if(gap >= PHYS_MAG_RANGE) return 0;

    /* The relevant poles are the ones that face each other:
       lower's TOP pole and upper's BOTTOM pole. */
    const same = (lower.userData.topPole === upper.userData.bottomPole);

    /* Force magnitude follows ~1/(gap+eps)^2 (inverse-square-like falloff,
       softened to avoid singularities). */
    const eps = 0.05;
    const safeGap = Math.max(gap, -RH * 0.4); // don't blow up if briefly overlapping
    const mag = PHYS_MAG_STRENGTH / ((Math.abs(safeGap) + eps) * (Math.abs(safeGap) + eps));

    /* Smooth taper near the cutoff so force doesn't snap to zero. */
    const taper = Math.max(0, 1 - gap / PHYS_MAG_RANGE);

    /* Sign: same poles facing => repel (push upper up, +)
            opposite poles    => attract (pull upper down, -) */
    const sign = same ? +1 : -1;

    return sign * mag * taper;
}

/* Top of the pole — active ring starts dropping from slightly below this. */
const POLE_TOP_Y = BY + BT + 5.8;

/* Start the simulator for the active (most recently added) ring.
   SIMPLE MODEL:
   - Only the active (newest) ring is animated. All other rings are held at
     their analytic equilibrium positions by placeSettledRings()'s settleAnim
     and stay completely still.
   - The active ring feels gravity + magnetic forces from every other ring.
     It oscillates a few times in a repel landing, snaps stuck in an attract
     landing, and never escapes the pole.
   - When the active ring settles, placeSettledRings() runs once more to
     compute the final equilibrium for ALL rings (now including the new one)
     and slides everyone smoothly into place. Then the simulation ends. */
function startStackSimulation(){
    physicsAnims = physicsAnims.filter(a => a !== stackSim);
    if(onPole.length === 0){ stackSim = null; return; }

    const active   = onPole[onPole.length - 1];
    const belowIdx = onPole.length - 2;
    const below    = belowIdx >= 0 ? onPole[belowIdx] : null;

    let lastTime = performance.now();
    let simElapsed = 0;
    let restFrames = 0;

    /* === [VERSION B] Determine landing kind & target Y. ===
       targetY는 활성 자석이 진동하다가 결국 멎을 평형 위치다.
       원래 코드는 "바로 아래 자석 한 개와의 1대1 평형"으로 targetY를 계산했는데,
       그건 시뮬레이션 중 활성 자석이 실제로 받는 합산 자기력의 평형점과 어긋났다.
       그래서 진동이 멎고 placeSettledRings(true)로 재배치되면 점프가 발생.
       
       VERSION B 해결: targetY를 모든 아래 자석들의 합산 자기력장 평형점으로 계산.
       그러면 시뮬레이션의 진동 중심점과 최종 정착 위치가 일치한다. */
    let attractsBelow, targetY;
    if(below === null){
        attractsBelow = true;
        targetY = BY + BT + RH/2;
    } else {
        attractsBelow = (below.userData.topPole !== active.userData.bottomPole);
        if(attractsBelow){
            const belowFinalY = (typeof below.userData.settleTargetY === 'number'
                ? below.userData.settleTargetY
                : below.position.y);
            targetY = belowFinalY + RH + PHYS_MIN_GAP;
        } else {
            // 합산 평형점 — 활성 자석 아래 모든 자석의 자기력 합 = 활성 무게(1)
            const ringsBelow = [];
            for(let j=0; j<onPole.length-1; j++){
                const lower = onPole[j];
                const samePoleAsActiveBottom = (lower.userData.topPole === active.userData.bottomPole);
                const yj = (typeof lower.userData.settleTargetY === 'number'
                    ? lower.userData.settleTargetY
                    : lower.position.y);
                ringsBelow.push({ y: yj, samePoleAsActiveBottom });
            }
            const eqY = solveActiveEquilibriumY(onPole.length-1, ringsBelow, 0);
            if(eqY !== null){
                targetY = eqY;
            } else {
                // 폴백: 단일 쌍 공식
                const eps = 0.05;
                let targetGap = Math.sqrt(PHYS_MAG_STRENGTH / PHYS_GRAVITY) - eps;
                if(targetGap < 0.05) targetGap = 0.05;
                const belowFinalY = (typeof below.userData.settleTargetY === 'number'
                    ? below.userData.settleTargetY
                    : below.position.y);
                targetY = belowFinalY + RH + targetGap;
            }
        }
    }

    stackSim = {
        ring: active,
        update: (now) => {
            if(!active.userData.onPole){ stackSim = null; return true; }
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if(dt > PHYS_MAX_DT) dt = PHYS_MAX_DT;
            if(dt <= 0) return false;
            simElapsed += dt;

            /* === Force on active ring: gravity + magnetic pull from each
                  settled ring (using their FINAL target positions, not their
                  current settle-anim positions, so the magnetic field the
                  active ring feels matches its own targetY). === */
            let force = -PHYS_GRAVITY;
            for(let i=0; i<onPole.length; i++){
                const other = onPole[i];
                if(other === active) continue;
                /* Use the other ring's final target Y (where it'll be when
                   settled) so the force field is stable. */
                const otherY = (typeof other.userData.settleTargetY === 'number'
                    ? other.userData.settleTargetY
                    : other.position.y);
                const lowerY = Math.min(active.position.y, otherY);
                const upperY = Math.max(active.position.y, otherY);
                /* Construct a virtual lower/upper for pairMagneticForce. */
                const lower = active.position.y < otherY ? active : { position:{y:otherY}, userData: other.userData };
                const upper = active.position.y < otherY ? { position:{y:otherY}, userData: other.userData } : active;
                const fOnUpper = pairMagneticForce(lower, upper);
                if(active === upper) force += fOnUpper;
                else                 force += -fOnUpper;
            }

            /* Integrate (semi-implicit Euler). */
            active.userData.vy = (active.userData.vy || 0) + force * dt;
            /* Velocity cap. */
            if(active.userData.vy >  PHYS_VEL_CAP) active.userData.vy =  PHYS_VEL_CAP;
            if(active.userData.vy < -PHYS_VEL_CAP) active.userData.vy = -PHYS_VEL_CAP;
            /* Velocity-dependent damping. */
            const speed = Math.abs(active.userData.vy);
            if(speed < PHYS_SLOW_THRESH){
                const t = speed / PHYS_SLOW_THRESH;
                const damp = PHYS_DAMPING_SLOW + (PHYS_DAMPING - PHYS_DAMPING_SLOW) * t;
                active.userData.vy *= damp;
            } else {
                active.userData.vy *= PHYS_DAMPING;
            }
            active.position.y += active.userData.vy * dt;

            /* Hard floor (first ring lands on the base). */
            if(below === null){
                const floorY = BY + BT + RH/2;
                if(active.position.y <= floorY){
                    active.position.y = floorY;
                    active.userData.vy = 0;
                    active.userData.settleTargetY = floorY;
                    if(onPole.length === 6) setTimeout(checkWin, 400);
                    stackSim = null;
                    placeSettledRings(true);
                    return true;
                }
                return false;
            }

            /* Pairwise constraint with below (using its CURRENT position so
               active visually touches below exactly, even if below is mid-
               settleAnim). The chain's final equilibrium is enforced by
               placeSettledRings() after stackSim ends. */
            const surfaceGap = (active.position.y - below.position.y) - RH;

            if(attractsBelow){
                /* Attract: snap when close enough — touch exactly. */
                if(surfaceGap < PHYS_STICK_GAP){
                    /* Visually snap active to below's CURRENT y so they touch
                       on screen immediately. */
                    active.position.y = below.position.y + RH + PHYS_MIN_GAP;
                    active.userData.vy = 0;
                    /* But set settleTargetY based on below's FINAL target
                       (its settleTargetY), not its current animating position.
                       This guarantees the deterministic final equilibrium. */
                    const belowTargetY = (typeof below.userData.settleTargetY === 'number')
                        ? below.userData.settleTargetY
                        : below.position.y;
                    active.userData.settleTargetY = belowTargetY + RH + PHYS_MIN_GAP;
                    if(onPole.length === 6) setTimeout(checkWin, 400);
                    stackSim = null;
                    placeSettledRings(true);
                    return true;
                }
            } else {
                /* Repel: never overlap. Small safety gap. */
                if(surfaceGap < 0.02){
                    active.position.y = below.position.y + RH + 0.02;
                    if(active.userData.vy < 0) active.userData.vy = -active.userData.vy * 0.3;
                }
            }

            /* Ceiling clamp (active only — settled rings are held by settleAnim). */
            const ceilY = POLE_TOP_Y - RH/2 - 0.05;
            if(active.position.y > ceilY){
                active.position.y = ceilY;
                if(active.userData.vy > -2.0) active.userData.vy = -2.0;
            }

            /* === [VERSION B FIX] Rest detection (repel case). ===
               사용자 요구: "진동의 평균값(중간값)에 정지해야 한다. 위로 올라가면 안 된다."
               
               감쇠 진동의 자연스러운 결과 = 진동의 평균값에 정착이다.
               진동 중심점은 시뮬레이션이 자기력+중력으로 자연스럽게 결정한다.
               코드는 그 결과를 인위적으로 targetY로 스냅하지 말고 그대로 둬야 한다.
               
               중요: 진동 중심점에 가까운지(distToTarget) 검사하지 않는다.
               그저 속도가 충분히 작아진 프레임이 일정 횟수 이상 누적되면 정지로 본다. */
            if(!attractsBelow){
                if(speed < PHYS_SETTLE_VEL){
                    restFrames++;
                    if(restFrames > 8){
                        // 활성 자석은 그 자리에 그대로 멈춘다 — 점프 없음
                        active.userData.vy = 0;
                        active.userData.settleTargetY = active.position.y;
                        if(onPole.length === 6) setTimeout(checkWin, 400);
                        stackSim = null;
                        // placeSettledRings(true) 호출하지 않음 → 위로 점프 없음
                        return true;
                    }
                } else {
                    restFrames = 0;
                }
            }

            /* Hard timeout — 진동이 5초 안에 안 멎으면 그 시점의 현재 위치에서 정지. */
            if(simElapsed > 5.0){
                active.userData.vy = 0;
                active.userData.settleTargetY = active.position.y;
                if(onPole.length === 6) setTimeout(checkWin, 400);
                stackSim = null;
                return true;
            }

            return false;
        }
    };
    physicsAnims.push(stackSim);
}

function reStack(){
    let y = BY + BT + RH/2;
    for(let i=0; i<onPole.length; i++){
        const r=onPole[i];
        if(i>0){
            const pv=onPole[i-1];
            if(pv.userData.topPole !== r.userData.bottomPole){
                y += RH + G_ATT; r.userData.attracts=true;
            } else {
                y += RH + G_REP; r.userData.attracts=false;
            }
        }
        r.position.set(0, y, 0);
    }
}

function checkWin(){
    let ok;
    if(curM===1){ ok=true; for(let i=1;i<onPole.length;i++) if(onPole[i].userData.attracts){ok=false;break;} }
    else if(curM===2){ ok=true; for(let i=1;i<onPole.length;i++) if(!onPole[i].userData.attracts){ok=false;break;} }
    else { const ex=[false,true,false,false,true]; ok=true; for(let i=1;i<onPole.length;i++) if(onPole[i].userData.attracts!==ex[i-1]){ok=false;break;} }
    ok ? showOK() : showRetry();
}

function resetTbl(){
    physicsAnims = [];
    stackSim = null;
    settleAnim = null;
    wobbleAnim = null;
    onPole.forEach(r=>{ r.userData.onPole=false; r.userData.attracts=false; r.userData.vy=0; r.userData.anchored=false; r.userData.settled=false; r.userData.settleCount=0; r.userData.settleTargetY=undefined; r.position.copy(r.userData.originalPos); });
    onPole=[];
}

function goBack(){

    document.querySelectorAll('.popup-overlay,.info-box').forEach(p=>p.remove());
    cancelCat();
    document.getElementById('barMagnetEl').style.display='none';
    document.getElementById('checkPoleBtn').style.display='none';
    quizUp=false; attachRing=null; physicsAnims=[]; stackSim=null; settleAnim=null; wobbleAnim=null;
    bmActive=false; checking=false; dragBM=false;

    if(pChecked){ resetTbl(); return; }

    /* Full reset then show cat → button */
    setup(curM);
    showCat('고리 자석의 극을 확인해 보세요.','left', false, ()=>{
        document.getElementById('checkPoleBtn').style.display='block';
        document.getElementById('checkPoleBtn').classList.remove('no-pulse');
    }, './cat_voice_1.mp3');
}
function goHome(){
    document.querySelectorAll('.popup-overlay,.info-box').forEach(p=>p.remove());
    document.getElementById('catWrap').style.display='none';
    document.getElementById('barMagnetEl').style.display='none';
    document.getElementById('missionCardWrap').style.display='none';
    if('speechSynthesis' in window) speechSynthesis.cancel();
    quizUp=false; attachRing=null; physicsAnims=[]; stackSim=null; settleAnim=null; wobbleAnim=null;

    document.getElementById('mainScreen').style.display='flex';
}

/* ============================================================
   ANIMATION
   ============================================================ */
function anim(){
    animId = requestAnimationFrame(anim);
    if(!ren) return;

    const now = performance.now();

    // Update physics animations
    physicsAnims = physicsAnims.filter(a => !a.update(now));

    // Labels and pole visualization: always visible when identified
    const labelR = (RI + RO) * 0.42;
    const cd = new THREE.Vector3();
    cam.getWorldDirection(cd); cd.y=0; cd.normalize();
    rings.forEach(g=>{
        const u = g.userData;
        if(!u.identified) return;
        if(u.topLabel){
            u.topLabel.visible = true;
            u.topLabel.position.set(0, RH/2 + 0.02, labelR);
        }
        /* Side sticker labels: rotate to face camera while stuck on surface */
        const sideAngle = Math.atan2(-cd.x, -cd.z);
        if(u.sideTopLabel){
            u.sideTopLabel.visible = true;
            u.sideTopLabel.rotation.y = sideAngle;
        }
        if(u.sideBotLabel){
            u.sideBotLabel.visible = true;
            u.sideBotLabel.rotation.y = sideAngle;
        }
        if(u.poleVis) u.poleVis.visible = true;
    });

    ren.render(scene, cam);
}

/* ============================================================
   INIT
   ============================================================ */

/* BGM */
let bgm = null;
let bgmPlaying = false;

function initBGM(){
    if(bgm) return;
    bgm = new Audio('./Notes_on_a_Sunny_Desk_Gemini.mp3');
    bgm.loop = true;
    bgm.volume = 0.13;
}

function toggleBGM(){
    initBGM();
    if(bgmPlaying){
        bgm.pause();
        bgmPlaying = false;
    } else {
        bgm.currentTime = 0;
        bgm.play().catch(()=>{});
        bgmPlaying = true;
    }
    updateMusicIcons();
}

function updateMusicIcons(){
    const icon = bgmPlaying ? '🔊' : '🔇';
    const mainBtn = document.getElementById('btnMusicMain');
    const expBtn = document.getElementById('btnMusic');
    if(mainBtn) mainBtn.textContent = icon;
    if(expBtn) expBtn.textContent = icon;
}

/* Bar magnet responsive scaling */
const BM_BASE_W = 1440; /* reference screen width for scale=1 */
function updateBarMagnetScale(){
    const bm = document.getElementById('barMagnetEl');
    if(!bm || bm.style.display === 'none') return;
    const scale = Math.max(0.62, Math.min(1.0, STAGE_W / BM_BASE_W));
    bm.style.transform = 'scale(' + scale + ')';
}

document.addEventListener('DOMContentLoaded', ()=>{
    layoutAppStage();
    const cv = document.getElementById('threeCanvas');
    cv.addEventListener('pointerdown', onDown);
    cv.addEventListener('wheel', onWheel, {passive:true});

    /* Auto-play BGM immediately */
    initBGM();
    bgm.play().then(()=>{ bgmPlaying=true; updateMusicIcons(); }).catch(()=>{
        /* Browser blocked autoplay - start on first user interaction */
        const startBGMOnce = ()=>{
            if(!bgmPlaying){
                bgm.play().then(()=>{ bgmPlaying=true; updateMusicIcons(); }).catch(()=>{});
            }
            document.removeEventListener('click', startBGMOnce);
            document.removeEventListener('mousedown', startBGMOnce);
            document.removeEventListener('touchstart', startBGMOnce);
        };
        document.addEventListener('click', startBGMOnce);
        document.addEventListener('mousedown', startBGMOnce);
        document.addEventListener('touchstart', startBGMOnce);
    });

    /* Resize handler for stage + bar magnet.
       Note: we intentionally do NOT listen to visualViewport 'resize',
       because the OS zoom is disabled — only our custom userScale matters. */
    const syncLayout = ()=>{ layoutAppStage(); updateBarMagnetScale(); };
    addEventListener('resize', syncLayout);
    addEventListener('orientationchange', ()=> setTimeout(syncLayout, 250));

    /* ============================================================
       CUSTOM PINCH-ZOOM + PAN
       OS-level page zoom is disabled (user-scalable=no), so we
       implement pinch-zoom and panning ourselves on top of the stage
       transform. This is what eliminates the visual-viewport drift
       that caused the page to "slide" on mobile.
       ============================================================ */
    const viewport = document.getElementById('appViewport');
    const stageEl = document.getElementById('appStage');

    /* Two-finger gesture state */
    let pinchActive = false;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchStartTx = 0, pinchStartTy = 0;
    let pinchCenter = {x:0, y:0};      /* screen-space anchor */

    /* One-finger pan state (only active when zoomed in) */
    let panActive = false;
    let panStartX = 0, panStartY = 0;
    let panStartTx = 0, panStartTy = 0;

    const dist = (a,b)=> Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    const mid  = (a,b)=> ({x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2});

    /* Clamp the user pan so the (zoomed) stage cannot be dragged beyond
       the screen edges. We work in screen pixels relative to the fitted
       stage rect. */
    function clampUserPan(){
        const stageScreenW = STAGE_W * fitScale * userScale;
        const stageScreenH = STAGE_H * fitScale * userScale;
        const fitW = STAGE_W * fitScale;
        const fitH = STAGE_H * fitScale;
        /* When userScale === 1, allowed range is exactly 0 (no panning).
           When zoomed in, you can pan the extra width/height in either
           direction. */
        const maxTx = Math.max(0, (stageScreenW - fitW) / 2);
        const maxTy = Math.max(0, (stageScreenH - fitH) / 2);
        if(userTx >  maxTx) userTx =  maxTx;
        if(userTx < -maxTx) userTx = -maxTx;
        if(userTy >  maxTy) userTy =  maxTy;
        if(userTy < -maxTy) userTy = -maxTy;
    }

    /* True if the touch target is something the app needs exclusive control
       over — magnet, 3D canvas, buttons. In those cases we don't steal the
       gesture for panning. (Pinch is handled separately and always wins.) */
    function isInteractiveTarget(t){
        if(!t) return false;
        if(t.closest && (
            t.closest('#barMagnetEl') ||
            t.closest('#threeCanvas') ||
            t.closest('button') ||
            t.closest('.ui-btn') ||
            t.closest('.mission-card')
        )) return true;
        return false;
    }

    viewport.addEventListener('touchstart', (e)=>{
        if(e.touches.length === 2){
            /* Start pinch */
            pinchActive = true;
            panActive = false;
            const t0 = e.touches[0], t1 = e.touches[1];
            pinchStartDist  = dist(t0, t1);
            pinchStartScale = userScale;
            pinchStartTx    = userTx;
            pinchStartTy    = userTy;
            pinchCenter     = mid(t0, t1);
            e.preventDefault();
            return;
        }
        if(e.touches.length === 1){
            /* Only start pan when we are zoomed in AND the touch is not
               on an interactive element (magnet, 3D canvas, buttons). */
            if(userScale > 1.001 && !isInteractiveTarget(e.target)){
                panActive = true;
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
                panStartTx = userTx;
                panStartTy = userTy;
                e.preventDefault();
            }
        }
    }, {passive:false});

    viewport.addEventListener('touchmove', (e)=>{
        if(pinchActive && e.touches.length >= 2){
            const t0 = e.touches[0], t1 = e.touches[1];
            const d = dist(t0, t1);
            if(pinchStartDist > 0){
                let nextScale = pinchStartScale * (d / pinchStartDist);
                nextScale = Math.max(USER_SCALE_MIN, Math.min(USER_SCALE_MAX, nextScale));
                /* Anchor the zoom around the initial pinch midpoint so the
                   content under the fingers stays put. The math:
                   newT = (startT + (anchor - center0)) - (anchor - center0) * (newScale/startScale)
                   simplifies (since the fit-center is the same) to keeping
                   the screen point at `pinchCenter` invariant under the
                   scale change relative to the stage. */
                const fitCx = fitLeft + (STAGE_W * fitScale)/2;
                const fitCy = fitTop  + (STAGE_H * fitScale)/2;
                /* Position of the pinch anchor in stage-fit space */
                const ax = pinchCenter.x - fitCx;
                const ay = pinchCenter.y - fitCy;
                const ratio = nextScale / pinchStartScale;
                userScale = nextScale;
                userTx = pinchStartTx * ratio + ax * (1 - ratio);
                userTy = pinchStartTy * ratio + ay * (1 - ratio);
                /* Also follow the moving midpoint so two-finger drag pans too */
                const cur = mid(t0, t1);
                userTx += (cur.x - pinchCenter.x);
                userTy += (cur.y - pinchCenter.y);
                pinchCenter = cur;
                pinchStartScale = nextScale;
                pinchStartTx = userTx;
                pinchStartTy = userTy;
                pinchStartDist = d;
                clampUserPan();
                layoutAppStage();
                if(typeof updateBarMagnetScale === 'function') updateBarMagnetScale();
            }
            e.preventDefault();
            return;
        }
        if(panActive && e.touches.length === 1){
            const t = e.touches[0];
            userTx = panStartTx + (t.clientX - panStartX);
            userTy = panStartTy + (t.clientY - panStartY);
            clampUserPan();
            layoutAppStage();
            e.preventDefault();
        }
    }, {passive:false});

    const endTouch = (e)=>{
        if(e.touches && e.touches.length < 2) pinchActive = false;
        if(!e.touches || e.touches.length === 0){
            panActive = false;
            /* Snap back to no-pan when fully zoomed out */
            if(userScale <= 1.001){
                userScale = 1; userTx = 0; userTy = 0;
                layoutAppStage();
                if(typeof updateBarMagnetScale === 'function') updateBarMagnetScale();
            }
        }
    };
    viewport.addEventListener('touchend', endTouch);
    viewport.addEventListener('touchcancel', endTouch);

    /* Double-tap to toggle zoom (mobile convenience).
       Disabled over interactive targets (3D canvas, magnet, buttons, cards)
       so app gestures like double-tap-to-flip on a ring magnet aren't
       hijacked by the page-zoom toggle. */
    let lastTapTime = 0, lastTapX = 0, lastTapY = 0;
    viewport.addEventListener('touchend', (e)=>{
        if(e.changedTouches.length !== 1) return;
        if(pinchActive || panActive) return;
        if(isInteractiveTarget(e.target)){ lastTapTime = 0; return; }
        const t = e.changedTouches[0];
        const now = Date.now();
        if(now - lastTapTime < 300 &&
           Math.hypot(t.clientX-lastTapX, t.clientY-lastTapY) < 30){
            /* Double tap: toggle between 1x and 2x at the tap point */
            if(userScale > 1.001){
                userScale = 1; userTx = 0; userTy = 0;
            } else {
                const fitCx = fitLeft + (STAGE_W * fitScale)/2;
                const fitCy = fitTop  + (STAGE_H * fitScale)/2;
                userScale = 2;
                userTx = (fitCx - t.clientX);
                userTy = (fitCy - t.clientY);
                clampUserPan();
            }
            layoutAppStage();
            if(typeof updateBarMagnetScale === 'function') updateBarMagnetScale();
            lastTapTime = 0;
        } else {
            lastTapTime = now;
            lastTapX = t.clientX; lastTapY = t.clientY;
        }
    });
});
</script>
